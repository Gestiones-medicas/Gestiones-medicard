<script>

// ===============================
// GENERAR GUION REAL (OpenAI)
// ===============================
async function generateScript() {
  const topic = document.getElementById("topic").value;

  const res = await fetch("http://localhost:3000/api/ai", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ topic })
  });

  const data = await res.json();

  document.getElementById("script").value = data.script;
}

// ===============================
// GENERAR VIDEO REAL (HeyGen)
// ===============================
async function generateVideo() {

  const script = document.getElementById("script").value;

  document.getElementById("videoArea").innerHTML = "⏳ Generando...";

  const res = await fetch("http://localhost:3000/api/video", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text: script })
  });

  const data = await res.json();

  if (!data.data) {
    alert("Error generando video");
    return;
  }

  const videoId = data.data.video_id;

  // polling
  let videoUrl = null;

  while (!videoUrl) {
    await new Promise(r => setTimeout(r, 3000));

    const statusRes = await fetch(
      `https://api.heygen.com/v1/video/status?video_id=${videoId}`,
      {
        headers: {
          "X-Api-Key": "NO USAR AQUÍ (esto debe ir en backend)"
        }
      }
    );

    const statusData = await statusRes.json();

    if (statusData.data?.status === "completed") {
      videoUrl = statusData.data.video_url;
    }
  }

  document.getElementById("videoArea").innerHTML = `
    <video controls src="${videoUrl}"></video>
  `;
}

</script>
