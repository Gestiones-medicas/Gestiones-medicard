<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video SaaS</title>

<style>
body {
  background: #0a0a0a;
  color: #00ff00;
  font-family: monospace;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  border: 1px solid #00ff00;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  background: black;
  color: #00ff00;
  border: 1px solid #00ff00;
  padding: 10px;
}

button {
  background: #00ff00;
  color: black;
  border: none;
  padding: 10px;
  cursor: pointer;
  margin-top: 10px;
}

video {
  width: 100%;
  margin-top: 10px;
}

.stat {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 AI VIDEO GENERATOR</h1>

<div class="card">
<h3>💰 Créditos: <span id="credits">5</span></h3>
</div>

<div class="card">
<h3>🎯 Generar Guion</h3>

<input id="topic" placeholder="Tema del video">

<button onclick="generateScript()">Generar con IA</button>

<textarea id="script" rows="5"></textarea>
</div>

<div class="card">
<h3>🎬 Generar Video</h3>

<button onclick="generateVideo()">Generar Video</button>

<div id="videoArea"></div>
</div>

<div class="card">
<h3>📂 Historial</h3>
<div id="history"></div>
</div>

</div>

<script>

// ===============================
// SISTEMA LOCAL (SIMULACIÓN SaaS)
// ===============================

let credits = localStorage.getItem("credits") || 5;
let history = JSON.parse(localStorage.getItem("history") || "[]");

updateUI();

// ===============================
// GENERAR GUION (IA SIMULADA)
// ===============================

function generateScript() {
  const topic = document.getElementById("topic").value;

  if (!topic) return alert("Escribe un tema");

  const script = `🔥 Hoy hablaremos sobre ${topic}. 
Aprende cómo protegerte y mejorar tu seguridad digital.`;

  document.getElementById("script").value = script;
}

// ===============================
// GENERAR VIDEO (SIMULADO)
// ===============================

async function generateVideo() {

  if (credits <= 0) {
    alert("Sin créditos 💰");
    return;
  }

  const script = document.getElementById("script").value;

  if (script.length < 10) {
    alert("Guion muy corto");
    return;
  }

  document.getElementById("videoArea").innerHTML = "⏳ Generando...";

  // Simulación backend
  await new Promise(r => setTimeout(r, 2000));

  const videoUrl = "https://www.w3schools.com/html/mov_bbb.mp4";

  credits--;
  localStorage.setItem("credits", credits);

  history.unshift({
    script,
    videoUrl,
    date: new Date().toLocaleString()
  });

  localStorage.setItem("history", JSON.stringify(history));

  renderVideo(videoUrl);
  updateUI();
}

// ===============================
// UI
// ===============================

function renderVideo(url) {
  document.getElementById("videoArea").innerHTML = `
    <video controls src="${url}"></video>
    <button onclick="download('${url}')">⬇ Descargar</button>
  `;
}

function updateUI() {
  document.getElementById("credits").innerText = credits;

  const historyDiv = document.getElementById("history");

  historyDiv.innerHTML = history.map(v => `
    <div class="stat">
      🎬 ${v.date}
    </div>
  `).join("");
}

function download(url) {
  const a = document.createElement("a");
  a.href = url;
  a.download = "video.mp4";
  a.click();
}

</script>

</body>
</html>
